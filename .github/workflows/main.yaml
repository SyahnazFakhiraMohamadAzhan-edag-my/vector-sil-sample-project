name: Sil-Testing

on:
  pull_request:

permissions:
  checks: write
  contents: read

jobs:
  # Job to build the System Under Test (SUT)
  build-sut:
    name: Build SUT
    runs-on: vtt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build SUT with VttMake
        shell: powershell
        run: |
          & "C:\Program Files\Vector vVIRTUALtarget 9\Exec64\VttMake.exe" make ./LightControl_MinGW.vttmake
          if ($LASTEXITCODE -ne 0) { Write-Host "VttMake failed." -ForegroundColor Red; exit 1 }

      - name: Upload SUT artifact
        uses: actions/upload-artifact@v4
        with:
          name: SUT
          path: ./SUT
          retention-days: 7

      - name: List built DLLs
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.dll | Select-Object -First 50 | ForEach-Object { Write-Host $_.FullName }

  # Job to build the simulation environment and compile test units
  build-simulation:
    name: Build simulation
    needs: [build-sut]
    runs-on: canoe-small
    steps:
      # check out the repository containing the codebase
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch SUT artifact
        uses: actions/download-artifact@v4
        with:
          name: SUT
          path: SUT

      - name: Make environment
        shell: powershell
        run: |
            environment-make . -o ./compiled-environment-and-tests

      - name: Make test units
        shell: powershell
        run: |
            test-unit-make ./test/SoftwareTest.vtestunit.yaml -e ./compiled-environment-and-tests/Default.venvironment -o ./compiled-environment-and-tests/

      # upload the compiled environment and test units as an artifact
      - name: Export compiled-environment-and-tests
        uses: actions/upload-artifact@v4
        with:
          name: compiled-environment-and-tests
          path: ./compiled-environment-and-tests/
          retention-days: 7

  # Job to run the simulation tests
  run-tests-simulation:
    name: Run simulation
    needs: build-simulation
    runs-on: canoe-large
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch SUT artifact
        uses: actions/download-artifact@v4
        with:
          name: SUT
          path: SUT

      - name: Fetch compiled-environment-and-tests artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-environment-and-tests
          path: compiled-environment-and-tests

      - name: Run CANoe Server Edition
        id: canoese
        shell: powershell
        run: |
          $envPath = Get-ChildItem -Path . -Recurse -Filter 'Default.venvironment' -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $envPath) { Write-Error "Default.venvironment not found after artifact download"; exit 1 }
          $tuPath = Get-ChildItem -Path . -Recurse -Filter 'SoftwareTest.vtestunit' -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $tuPath) { Write-Error "SoftwareTest.vtestunit not found after artifact download"; exit 1 }
          New-Item -ItemType Directory -Force -Path ./simulation | Out-Null
          Write-Host "Using environment: $envPath"
          Write-Host "Using test unit: $tuPath"
          & canoe-se "$envPath" -d ./simulation --test-unit "$tuPath"
          Write-Host "CANoe Server Edition returned exit code $LASTEXITCODE"
          exit $LASTEXITCODE

      - name: Export test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Test Reports
          path: |
            ./simulation/TestReports/
          retention-days: 7

      - name: Upload log files
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Log Files
          path: ./simulation/*.txt

    # Job to display the test report
  display-test-report:
    name: Display test report
    needs: run-tests-simulation
    runs-on: canoe-small
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch test report artifact
        uses: actions/download-artifact@v4
        with:
          name: Test Reports
          path: ./simulation/TestReports/

      - name: Convert all test reports to XUnit format
        working-directory: ./simulation/TestReports/
        shell: powershell
        run: |
          get-childitem . -Filter *.vtestreport | foreach {
            ReportViewerCli -r $_ -xu
          }


      - name: Create HTML reports and XSL-styled copies
        working-directory: ./simulation/TestReports/
        shell: powershell
        run: |
          # Write minimal XSL stylesheet to render XML as HTML when opened or transformed
          $xsl = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <xsl:stylesheet version="1.0" xmlns:xsl="http://www.w3.org/1999/XSL/Transform">
            <xsl:output method="html" encoding="UTF-8" />
            <xsl:template match="/">
              <html>
                <head>
                  <title>Test Report</title>
                  <style>
                    body { font-family: Arial, sans-serif; margin: 1rem 2rem; }
                    table { border-collapse: collapse; width: 100%; }
                    th, td { border: 1px solid #ccc; padding: .4rem .6rem; text-align: left; }
                    th { background: #f7f7f7; }
                    .pass { color: #2e7d32; }
                    .fail { color: #c62828; }
                    .skip { color: #6a1b9a; }
                  </style>
                </head>
                <body>
                  <h1>Test Report</h1>
                  <p>
                    Suites: <strong><xsl:value-of select="count(//testsuite)"/></strong> |
                    Tests: <strong><xsl:value-of select="sum(//testsuite/@tests)"/></strong> |
                    Failures: <strong><xsl:value-of select="sum(//testsuite/@failures)"/></strong> |
                    Errors: <strong><xsl:value-of select="sum(//testsuite/@errors)"/></strong> |
                    Skipped: <strong><xsl:value-of select="sum(//testsuite/@skipped)"/></strong> |
                    Time: <strong><xsl:value-of select="format-number(sum(//testcase/@time), '0.000')"/></strong>s
                  </p>
                  <table>
                    <tr><th>Suite</th><th>Case</th><th>Status</th><th>Time (s)</th><th>Message</th></tr>
                    <xsl:for-each select="//testcase">
                      <tr>
                        <td><xsl:value-of select="../@name" /></td>
                        <td><xsl:value-of select="@name" /></td>
                        <td>
                          <xsl:choose>
                            <xsl:when test="failure"><span class="fail">FAIL</span></xsl:when>
                            <xsl:when test="error"><span class="fail">ERROR</span></xsl:when>
                            <xsl:when test="skipped"><span class="skip">SKIPPED</span></xsl:when>
                            <xsl:otherwise><span class="pass">PASS</span></xsl:otherwise>
                          </xsl:choose>
                        </td>
                        <td><xsl:value-of select="@time"/></td>
                        <td><xsl:if test="failure|error|skipped"><xsl:value-of select="(failure|error|skipped)/@message"/></xsl:if></td>
                      </tr>
                    </xsl:for-each>
                  </table>
                </body>
              </html>
            </xsl:template>
          </xsl:stylesheet>
          "@
          Set-Content -Path "junit-report.xsl" -Value $xsl -Encoding UTF8

          # Convert each *_xunit.xml to a standalone HTML file using .NET XSLT (no Python required)
          Get-ChildItem -Filter "*_xunit.xml" | ForEach-Object {
            $in = $_.FullName
            $outHtml = [System.IO.Path]::ChangeExtension($in, ".html")
            $xslPath = Join-Path $_.DirectoryName "junit-report.xsl"
            $xslt = New-Object System.Xml.Xsl.XslCompiledTransform
            $xslt.Load($xslPath)
            $xslt.Transform($in, $outHtml)

            # Create styled XML copy that references the stylesheet
            $styled = $in -replace '\.xml$', '_styled.xml'
            $xml = Get-Content $in -Raw
            if ($xml -match '^\s*<\?xml.*\?>') {
              $xml = $xml -replace '^\s*<\?xml.*\?>', "$0`r`n<?xml-stylesheet type=\"text/xsl\" href=\"junit-report.xsl\"?>"
            } else {
              $xml = "<?xml-stylesheet type=\"text/xsl\" href=\"junit-report.xsl\"?>`r`n$xml"
            }
            Set-Content -Path $styled -Value $xml -Encoding UTF8
          }


      - name: Upload XUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: xunit-xml
          path: ./simulation/TestReports/*_xunit.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload HTML & styled XML reports
        uses: actions/upload-artifact@v4
        with:
          name: xunit-html
          path: |
            ./simulation/TestReports/*.html
            ./simulation/TestReports/*_styled.xml
            ./simulation/TestReports/junit-report.xsl
          if-no-files-found: warn
          retention-days: 7


      - name: Display test results
        uses: dorny/test-reporter@v1.9.1
        with:
          name: Test results
          path: "./simulation/TestReports/*_xunit.xml"
          reporter: java-junit
          fail-on-error: 'false'


